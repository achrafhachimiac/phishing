# noVNC reverse-proxy protected by the same backend session cookie used by the UI.
# Include this inside the HTTPS server block for the application.

location = /_auth_session {
    internal;
    proxy_pass http://127.0.0.1:4000/api/auth/verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/novnc/(\d+)/(.*) {
    set $novnc_port $1;
    auth_request /_auth_session;

    proxy_pass http://127.0.0.1:$novnc_port/$2$is_args$args;
    proxy_http_version 1.1;

    # WebSocket upgrade — required for VNC connections
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Keep VNC sessions alive for up to 1 hour
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
}
