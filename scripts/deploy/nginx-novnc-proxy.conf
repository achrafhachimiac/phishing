# noVNC WebSocket reverse-proxy for browser sandbox sessions.
# Include this inside the HTTPS server block for the application:
#
#   server {
#       listen 443 ssl;
#       server_name fred.syntrix.ae;
#       ...
#       include /etc/nginx/snippets/novnc-proxy.conf;
#   }

location ~ ^/novnc/(\d+)/(.*) {
    set $novnc_port $1;

    proxy_pass http://127.0.0.1:$novnc_port/$2$is_args$args;
    proxy_http_version 1.1;

    # WebSocket upgrade — required for VNC connections
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Keep VNC sessions alive for up to 1 hour
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
}
