name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Package release bundle
        run: |
          tar -czf release.tgz \
            dist \
            dist-server \
            scripts \
            package.json \
            package-lock.json

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release.tgz

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    env:
      DEPLOY_HOST: ${{ vars.SSH_HOST || '109.199.125.137' }}
      DEPLOY_USER: ${{ vars.SSH_USER || 'root' }}
      DEPLOY_PORT: ${{ vars.SSH_PORT || '22' }}
      DEPLOY_APP_DIR: ${{ vars.APP_DIR || '/opt/phishing' }}
      DEPLOY_SERVICE_NAME: ${{ vars.SYSTEMD_SERVICE || 'phishing' }}
      DEPLOY_APP_NAME: ${{ vars.APP_NAME || 'phishing' }}
      DEPLOY_APP_PORT: ${{ vars.APP_PORT || '4000' }}
      DEPLOY_ENV_PATH: /tmp/phishing.env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Write production env file
        if: ${{ secrets.APP_ENV_FILE != '' }}
        run: |
          printf '%s' '${{ secrets.APP_ENV_FILE }}' > app.env

      - name: Upload deployment assets
        run: |
          scp -P "$DEPLOY_PORT" release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/phishing-release.tgz"
          scp -P "$DEPLOY_PORT" scripts/deploy/remote-deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:/tmp/phishing-remote-deploy.sh"
          if [ -f app.env ]; then
            scp -P "$DEPLOY_PORT" app.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ENV_PATH"
          fi

      - name: Deploy on remote host
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod +x /tmp/phishing-remote-deploy.sh && \
            APP_NAME=$DEPLOY_APP_NAME \
            APP_DIR=$DEPLOY_APP_DIR \
            SERVICE_NAME=$DEPLOY_SERVICE_NAME \
            PORT=$DEPLOY_APP_PORT \
            ENV_FILE_PATH=${{ secrets.APP_ENV_FILE != '' && '/tmp/phishing.env' || '' }} \
            ENABLE_LOCAL_BROWSER_SANDBOX=1 \
            RELEASE_ARCHIVE=/tmp/phishing-release.tgz \
            /tmp/phishing-remote-deploy.sh"