name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Package release bundle
        run: |
          tar -czf release.tgz \
            dist \
            dist-server \
            package.json \
            package-lock.json

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release.tgz

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 109.199.125.137 >> ~/.ssh/known_hosts

      - name: Upload deployment assets
        run: |
          scp release.tgz root@109.199.125.137:/tmp/phishing-release.tgz
          scp scripts/deploy/remote-deploy.sh root@109.199.125.137:/tmp/phishing-remote-deploy.sh

      - name: Deploy on remote host
        run: |
          ssh root@109.199.125.137 \
            "chmod +x /tmp/phishing-remote-deploy.sh && \
            APP_NAME=phishing \
            APP_DIR=/opt/phishing \
            SERVICE_NAME=phishing \
            PORT=4000 \
            RELEASE_ARCHIVE=/tmp/phishing-release.tgz \
            /tmp/phishing-remote-deploy.sh"