name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Package release bundle
        run: |
          tar -czf release.tgz \
            dist \
            dist-server \
            scripts \
            package.json \
            package-lock.json

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release.tgz

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    env:
      DEPLOY_HOST: ${{ vars.SSH_HOST || '109.199.125.137' }}
      DEPLOY_USER: ${{ vars.SSH_USER || 'root' }}
      DEPLOY_PORT: ${{ vars.SSH_PORT || '22' }}
      DEPLOY_APP_DIR: ${{ vars.APP_DIR || '/opt/phishing' }}
      DEPLOY_SERVICE_NAME: ${{ vars.SYSTEMD_SERVICE || 'phishing' }}
      DEPLOY_APP_NAME: ${{ vars.APP_NAME || 'phishing' }}
      DEPLOY_APP_PORT: ${{ vars.APP_PORT || '4000' }}
      DEPLOY_ENV_PATH: /tmp/phishing.env
      APP_ENV_FILE_CONTENT: ${{ secrets.APP_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Write production env file
        run: |
          if [ -n "$APP_ENV_FILE_CONTENT" ]; then
            printf '%s' "$APP_ENV_FILE_CONTENT" > app.env
          fi

      - name: Normalize production env file
        if: env.APP_ENV_FILE_CONTENT != ''
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app.env')
          raw_lines = path.read_text().splitlines()
          entries = {}
          line_indexes = {}

          for index, raw_line in enumerate(raw_lines):
            stripped = raw_line.strip()
            if not stripped or stripped.startswith('#') or '=' not in raw_line:
              continue
            key, value = raw_line.split('=', 1)
            entries[key] = value
            line_indexes[key] = index

          if entries.get('BROWSER_SANDBOX_PROVIDER') == 'local-novnc':
            normalized_values = {
              'BROWSER_SANDBOX_START_COMMAND': 'bash scripts/sandbox/start-local-browser-sandbox.sh :jobId :url :displayNumber :vncPort :novncPort :cdpPort :sessionDir',
              'BROWSER_SANDBOX_STOP_COMMAND': 'bash scripts/sandbox/stop-local-browser-sandbox.sh :jobId :sessionDir',
            }

            for key, normalized_value in normalized_values.items():
              current_value = entries.get(key, '').strip()
              if key == 'BROWSER_SANDBOX_START_COMMAND' and current_value == 'bash scripts/sandbox/start-local-browser-sandbox.sh :jobId :url :displayNumber :vncPort :novncPort :sessionDir':
                raw_lines[line_indexes[key]] = f'{key}={normalized_value}'
              elif key == 'BROWSER_SANDBOX_STOP_COMMAND' and current_value == 'bash scripts/sandbox/stop-local-browser-sandbox.sh :jobId':
                raw_lines[line_indexes[key]] = f'{key}={normalized_value}'

          path.write_text('\n'.join(raw_lines) + '\n')
          PY

      - name: Validate production env file
        if: env.APP_ENV_FILE_CONTENT != ''
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          entries = {}
          for raw_line in Path('app.env').read_text().splitlines():
            line = raw_line.strip()
            if not line or line.startswith('#') or '=' not in line:
              continue
            key, value = line.split('=', 1)
            entries[key] = value.strip()

          errors = []
          provider = entries.get('BROWSER_SANDBOX_PROVIDER', '')
          start_command = entries.get('BROWSER_SANDBOX_START_COMMAND', '')
          stop_command = entries.get('BROWSER_SANDBOX_STOP_COMMAND', '')
          access_url = entries.get('BROWSER_SANDBOX_ACCESS_URL_TEMPLATE', '')

          if provider == 'local-novnc':
            if 'scripts/sandbox/start-local-browser-sandbox.sh' not in start_command:
              errors.append('BROWSER_SANDBOX_START_COMMAND must call scripts/sandbox/start-local-browser-sandbox.sh when BROWSER_SANDBOX_PROVIDER=local-novnc.')
            if ':cdpPort' not in start_command:
              errors.append('BROWSER_SANDBOX_START_COMMAND must include :cdpPort when BROWSER_SANDBOX_PROVIDER=local-novnc.')
            if ':sessionDir' not in start_command:
              errors.append('BROWSER_SANDBOX_START_COMMAND must include :sessionDir when BROWSER_SANDBOX_PROVIDER=local-novnc.')
            if 'scripts/sandbox/stop-local-browser-sandbox.sh' not in stop_command:
              errors.append('BROWSER_SANDBOX_STOP_COMMAND must call scripts/sandbox/stop-local-browser-sandbox.sh when BROWSER_SANDBOX_PROVIDER=local-novnc.')
            if ':sessionDir' not in stop_command:
              errors.append('BROWSER_SANDBOX_STOP_COMMAND must include :sessionDir when BROWSER_SANDBOX_PROVIDER=local-novnc.')
            if ':novncPort' not in access_url:
              errors.append('BROWSER_SANDBOX_ACCESS_URL_TEMPLATE must include :novncPort when BROWSER_SANDBOX_PROVIDER=local-novnc.')

          if errors:
            for error in errors:
              print(error)
            sys.exit(1)

          print('Production env validation passed.')
          PY

      - name: Upload deployment assets
        run: |
          scp -P "$DEPLOY_PORT" release.tgz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/phishing-release.tgz"
          scp -P "$DEPLOY_PORT" scripts/deploy/remote-deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:/tmp/phishing-remote-deploy.sh"
          if [ -f app.env ]; then
            scp -P "$DEPLOY_PORT" app.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ENV_PATH"
          fi

      - name: Deploy on remote host
        run: |
          ENV_FILE_ARG=""
          if [ -n "$APP_ENV_FILE_CONTENT" ]; then
            ENV_FILE_ARG="ENV_FILE_PATH=$DEPLOY_ENV_PATH"
          fi

          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod +x /tmp/phishing-remote-deploy.sh && \
            APP_NAME=$DEPLOY_APP_NAME \
            APP_DIR=$DEPLOY_APP_DIR \
            SERVICE_NAME=$DEPLOY_SERVICE_NAME \
            PORT=$DEPLOY_APP_PORT \
            $ENV_FILE_ARG \
            ENABLE_LOCAL_BROWSER_SANDBOX=1 \
            RELEASE_ARCHIVE=/tmp/phishing-release.tgz \
            /tmp/phishing-remote-deploy.sh"