name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Package release bundle
        run: |
          tar -czf release.tgz \
            dist \
            dist-server \
            package.json \
            package-lock.json

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release.tgz

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.SSH_HOST != '' && vars.SSH_USER != ''
    environment: production
    env:
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ vars.SSH_PORT || '22' }}" -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Render application environment file
        if: env.APP_ENV_FILE != ''
        run: |
          cat <<'EOF' > app.env
          ${{ env.APP_ENV_FILE }}
          EOF

      - name: Upload deployment assets
        run: |
          scp -P "${{ vars.SSH_PORT || '22' }}" release.tgz "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:/tmp/phishing-release.tgz"
          scp -P "${{ vars.SSH_PORT || '22' }}" scripts/deploy/remote-deploy.sh "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:/tmp/phishing-remote-deploy.sh"
          if [ -f app.env ]; then
            scp -P "${{ vars.SSH_PORT || '22' }}" app.env "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:/tmp/phishing.env"
          fi

      - name: Deploy on remote host
        run: |
          ssh -p "${{ vars.SSH_PORT || '22' }}" "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}" \
            "chmod +x /tmp/phishing-remote-deploy.sh && \
            APP_NAME='${{ vars.APP_NAME }}' \
            APP_DIR='${{ vars.APP_DIR }}' \
            SERVICE_NAME='${{ vars.SYSTEMD_SERVICE }}' \
            PORT='${{ vars.APP_PORT }}' \
            RELEASE_ARCHIVE='/tmp/phishing-release.tgz' \
            ENV_FILE_PATH='/tmp/phishing.env' \
            /tmp/phishing-remote-deploy.sh"